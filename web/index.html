<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>propAMM · Monad — execution monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Apply the stored theme before first paint so there's no wrong-theme flash. -->
    <script>
      try { document.documentElement.dataset.theme = localStorage.getItem('pamm-theme') === 'dark' ? 'dark' : 'light'; }
      catch (e) { document.documentElement.dataset.theme = 'light'; }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
