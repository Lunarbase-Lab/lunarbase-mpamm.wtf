# Render Blueprint (infra-as-code). Render reads this on "New → Blueprint" and
# builds the existing multi-stage Dockerfile — one always-on web service that
# serves the REST/WS API AND the built frontend (same origin), with a persistent
# disk for the SQLite history. Mirrors the Railway setup (railway.json).
#
# The two RPC vars are secrets (sync: false) — Render prompts for them on create;
# they are NOT committed. DB_PATH=/data/mpamm.db and WEB_DIST are already baked
# into the Dockerfile's ENV, so they don't need repeating here.
services:
  - type: web
    name: mpamm
    runtime: docker
    plan: starter            # always-on; the free tier spins down after 15m idle,
                             # which would kill the WS indexer + poll loop.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATA_SOURCE
        value: live
      - key: NODE_OPTIONS      # cap the JS heap well under the instance limit
        value: --max-old-space-size=320
      - key: RPC_HTTP_URL    # trusted Monad node (Multicall3 + getLogs)
        sync: false
      - key: RPC_WS_URL
        sync: false
    disk:
      name: mpamm-data       # SQLite history survives deploys/restarts
      mountPath: /data
      sizeGB: 1
