name: CI

# Verify every push + PR; deploy to Railway only when main is green.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · build · docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck (server + web)
        run: npm run typecheck

      - name: Build frontend
        run: npm -w web run build

      # Build the production image so a broken Dockerfile fails CI, not the deploy.
      - name: Build Docker image
        run: docker build -t mpamm:ci .

  deploy:
    name: deploy → Railway
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # one deploy at a time; never cancel an in-flight production deploy
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.RAILWAY_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        # RAILWAY_TOKEN = a Railway *project* token (Project → Settings → Tokens),
        # scoped to the target environment. RAILWAY_SERVICE = the service name.
        run: railway up --service "${{ vars.RAILWAY_SERVICE }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
