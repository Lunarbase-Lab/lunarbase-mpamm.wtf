name: CI

# Verify every push + PR. Deployment is handled by Render's native GitHub
# auto-deploy (push to main → Render builds the Dockerfile + deploys).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · build · docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck (server + web)
        run: npm run typecheck

      - name: Build frontend
        run: npm -w web run build

      # Build the production image so a broken Dockerfile fails CI.
      - name: Build Docker image
        run: docker build -t mpamm:ci .
